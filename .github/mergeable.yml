  - when: pull_request.*
    name: Add 'testsuite' label to PR if changeset includes changes to shared test schemas, fixtures, or harnesses
    validate:
      - do: changeset
        or:
          - must_include:
              regex: '^test/[^/]+\.thrift$'
          - must_include:
              regex: '^test/(Makefile|Makefile\.am|Makefile\.in|README\.md|index\.html|known_failures_Linux\.json|rebuild_known_failures\.sh|result\.js|results\.json|test\.py|tests\.json|valgrind\.suppress)$'
          - must_include:
              regex: '^test/(audit|crossrunner|features|keys|log|partial|threads|v0\.16)/.*'
    pass:
      - do: labels
        labels: ['testsuite']
        mode: 'add'

  - when: pull_request.*
    name: Add 'build and general CI' label to PR if changeset includes changes to CMake, automake, or build system files
    validate:
      - do: changeset
        or:
          - must_include:
              regex: '(^|.*/)CMakeLists\.txt$'
          - must_include:
              regex: '.*\.cmake$'
          - must_include:
              regex: '(^|.*/)Makefile\.am$'
          - must_include:
              regex: '(^|.*/)Makefile\.in$'
          - must_include:
              regex: '(^|.*/)configure\.ac$'
          - must_include:
              regex: '^bootstrap\.sh$'
          - must_include:
              regex: '^aclocal$'
          - must_include:
              regex: '^aclocal\.m4$'
          - must_include:
              regex: '^build/.*'
          - must_include:
              regex: '^build-docker/.*'
          - must_include:
              regex: '^debian/.*'
          - must_include:
              regex: '^appveyor\.yml$'
          - must_include:
              regex: '^sonar-project\.properties$'
    pass:
      - do: labels
        labels: ['build and general CI']
        mode: 'add'

  - when: pull_request.*
