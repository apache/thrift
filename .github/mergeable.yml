              regex: '(^|.*/)CMakeLists\.txt$'
          - must_include:
              regex: '.*\.cmake$'
          - must_include:
              regex: '(^|.*/)Makefile\.am$'
          - must_include:
              regex: '(^|.*/)Makefile\.in$'
          - must_include:
              regex: '(^|.*/)configure\.ac$'
          - must_include:
              regex: '^bootstrap\.sh$'
          - must_include:
              regex: '^aclocal$'
          - must_include:
              regex: '^aclocal\.m4$'
          - must_include:
              regex: '^build/.*'
          - must_include:
              regex: '^build-docker/.*'
          - must_include:
