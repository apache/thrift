version: 2
mergeable:
  - when: pull_request.*
    name: Add 'c_glib' label to PR if changeset includes changes to c_glib library, tests, tutorial, or generator files
    validate:
      - do: changeset
        or:
          - must_include:
              regex: 'lib/c_glib/.*'
          - must_include:
              regex: 'test/c_glib/.*'
          - must_include:
              regex: 'tutorial/c_glib/.*'
          - must_include:
              regex: 'compiler/cpp/src/thrift/generate/t_c_glib_generator\..*'
    pass:
      - do: labels
        labels: ['c_glib']
        mode: 'add'

