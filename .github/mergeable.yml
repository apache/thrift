version: 2
mergeable:
  - when: pull_request.*
    name: Add 'c_glib' label to PR if changeset includes changes to the lib/c_glib, test/c_glib, or tutorial/c_glib directories
    validate:
      - do: changeset
        or:
          - must_include:
              regex: 'lib/c_glib/.*'
          - must_include:
              regex: 'test/c_glib/.*'
          - must_include:
              regex: 'tutorial/c_glib/.*'
    pass:
      - do: labels
        labels: ['c_glib']
        mode: 'add'

